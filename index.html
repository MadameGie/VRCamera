<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Hand AR Packaging</title>

<style>
html,body{
margin:0;
width:100%;
height:100%;
overflow:hidden;
background:#000;
}

#video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:0;
}

#canvas3d{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:1;
}

#startBtn{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
z-index:9999;
padding:16px 24px;
font-size:18px;
border:none;
border-radius:12px;
background:white;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

</head>
<body>

<button id="startBtn">
Aktifkan Kamera
</button>

<video
id="video"
playsinline
autoplay
muted>
</video>

<canvas id="canvas3d"></canvas>

<script type="module" src="app.js"></script>

</body>
</html>

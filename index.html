<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Hand AR Packaging</title>

<style>
html,body{
margin:0;
width:100%;
height:100%;
overflow:hidden;
background:#000;
}

#video{
position:fixed;
inset:0;
width:100%;
height:100%;
object-fit:cover;
z-index:0;
}

#canvas3d{
position:fixed;
inset:0;
width:100%;
height:100%;
z-index:1;
pointer-events:none;
}

#status{
position:fixed;
top:12px;
left:12px;
z-index:2;
background:rgba(0,0,0,.6);
color:white;
padding:8px 12px;
border-radius:8px;
font-family:sans-serif;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

</head>
<body>

<div id="status">
Mengaktifkan kamera...
</div>

<video
id="video"
autoplay
playsinline
muted>
</video>

<canvas id="canvas3d"></canvas>

<script type="module" src="app.js"></script>

</body>
</html>

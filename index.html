<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VR Hand Tracking GLB</title>

<!-- A-FRAME -->
<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

<!-- MEDIA PIPE (WAJIB UNTUK HAND TRACKING) -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: black;
}

/* CAMERA BACKGROUND */
#cameraFeed {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 0;
}

/* A-FRAME SCENE */
a-scene {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
}

/* BUTTON START */
#startBtn {
    position: fixed;
    z-index: 9999;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    padding: 12px 20px;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    background: white;
    cursor: pointer;
}
</style>
</head>

<body>

<!-- BUTTON START -->
<button id="startBtn">Masuk VR</button>

<!-- CAMERA FEED -->
<video id="cameraFeed" autoplay muted playsinline></video>

<!-- GLB ASSET -->
<a-assets>
  <a-asset-item id="model3d" src="scene.glb"></a-asset-item>
</a-assets>

<!-- VR SCENE -->
<a-scene embedded vr-mode-ui="enabled: false">

    <!-- GLB DI TANGAN -->
    <a-entity id="handAnchor">
        <a-entity
            id="handModel"
            gltf-model="#model3d"
            scale="5 5 5">
        </a-entity>
    </a-entity>

    <!-- CAMERA -->
    <a-entity camera look-controls="magicWindowTrackingEnabled:true"></a-entity>

</a-scene>

<!-- APP LOGIC -->
<script src="app.js"></script>

</body>
</html>
